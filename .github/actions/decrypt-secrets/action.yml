name: 'Decrypt and Mask Secrets'
description: 'Decrypts a zip and masks the JSON contents as env vars'
inputs:
  zip_password:
    description: 'Password for the Zip'
    required: true
  zip_path:
    description: 'Path to the encrypted zip'
    required: false
    default: 'secrets.zip'

runs:
  using: "composite"
  steps:
    - name: install python deps
      shell: bash
      run: |
        pip install pyzipper
    - name: Decrypt and Mask
      shell: python
      env:
        ZIP_PWD: ${{ inputs.zip_password }}
        ZIP_PATH: ${{ inputs.zip_path }}
      run: |
        import pyzipper
        import json
        import os

        password = os.environ.get('ZIP_PWD')
        zip_path = os.environ.get('ZIP_PATH')

        if os.path.exists(zip_path):
            with pyzipper.AESZipFile(zip_path) as zf:
                zf.setpassword(password.encode())
                zf.extractall('.')
        else:
            print(f"Zip file {zip_path} not found. Skipping decryption.")
        
        if os.path.exists('secrets.json'):
            with open('secrets.json') as f:
                secrets = json.load(f)

            with open(os.environ['GITHUB_ENV'], 'a') as env_file:
                for key, value in secrets.items():
                    if value:
                        print(f"::add-mask::{value}")
                        env_file.write(f"{key}={value}\n")
            
            print(f"Successfully masked {len(secrets)} secrets.")
        else:
            print("Warning: secrets.json not found in zip.")